<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

    <!-- Parent Container -->
    <div style="display: flex; flex-direction: column; justify-content: center; align-items: center;">
    
    <!-- Headings -->
    <h1 style="text-align: center;">Quiz Game </h1>
    <div style="display: flex; gap: 30px;">
    <button id="start" style="width: 100px; margin-top: 30px; font-size: large;" onclick="quizLogic()">Start</button>
    </div> 

    <!-- Question -->   
     <div style="padding: 10px; width: 80%; text-align: center; display: flex; justify-content: center;">
    <h2 id="question" style="margin-top: 100px;">1, Question</h2></div>
    
    <!-- Options -->
    <div style="display: flex; flex-direction: column; gap: 25px; margin-top: 50px;">
        <div id="opt1" class="options">Option 1</div>
        <div id="opt2" class="options">Option 2</div>
        <div id="opt3" class="options">Option 3</div>
    </div>

    <div style="display: flex; flex-direction: column; align-items: center; gap: 20px;">
        <h3 style="margin-top: 50px; color: rgb(1, 121, 121); text-align: center;" id="greet">Wanna Play Some Quizy?</h3>         
        <button id="restart" style="border-radius: 10px; margin-top: 20px;"><i style="color:#d8ddf0; font-size: 17px;" class="fa-solid fa-arrow-rotate-right"></i></button>
    </div>
 </div>

 <script src="app.js"></script>


</body>
</html>
